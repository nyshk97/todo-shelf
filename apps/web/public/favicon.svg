<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Background with rounded corners -->
  <rect width="48" height="48" rx="10" fill="#181c25"/>

  <!-- Shelf frame - left vertical bar -->
  <rect x="10" y="10" width="2" height="30" rx="1" fill="#9ca3af"/>

  <!-- Shelf horizontal bars -->
  <rect x="10" y="10" width="28" height="2" rx="1" fill="#9ca3af"/>
  <rect x="10" y="19" width="28" height="2" rx="1" fill="#9ca3af"/>
  <rect x="10" y="28" width="28" height="2" rx="1" fill="#9ca3af"/>
  <rect x="10" y="38" width="28" height="2" rx="1" fill="#9ca3af"/>

  <!-- Top shelf items -->
  <rect x="16" y="12" width="6" height="5" rx="1.5" fill="#6aabf5"/>
  <rect x="25" y="12.5" width="8" height="5" rx="1.5" fill="#f0a030"/>

  <!-- Middle shelf items -->
  <rect x="14" y="22" width="5" height="4.5" rx="1.5" fill="#5bc870"/>
  <rect x="21" y="22.5" width="5" height="4" rx="1.5" fill="#6aabf5"/>
  <rect x="29" y="22" width="7" height="4.5" rx="1.5" fill="#c09adb"/>

  <!-- Bottom shelf items -->
  <rect x="20" y="31.5" width="9" height="5" rx="1.5" fill="#f0a030"/>
</svg>
